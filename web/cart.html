        <script>
            async function loadCartAndCheckout() {
                const response = await fetch("/ThrifteStop/LoadCartSummaryServlet");
                if (response.ok) {
                    const json = await response.json();
                    if (!json.status) {
                        iziToast.warning({title: "Oops", message: json.message, position: "topRight"});
                        return;
                    }

                    const container = document.getElementById("cartContainer");
                    container.innerHTML = "";

                    if (json.cartItems.length === 0) {
                        container.innerHTML = `
                <div class="text-center py-20 text-gray-500">
                    <div class="text-6xl text-gray-400 mb-4">
                        <i class="ri-shopping-cart-line"></i>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-700">Your cart is empty</h3>
                    <p class="text-gray-500 mt-2">Looks like you haven't added anything yet.</p>
                    <a href="productlist.html" class="inline-block mt-6 px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">
                        Start Shopping
                    </a>
                </div>
            `;

                        // Clear summary values
                        document.querySelector(".subtotal-label").innerText = "Subtotal";
                        document.querySelector(".subtotal-value").innerText = "Rs.0";
                        document.querySelector(".shipping-value").innerText = "Rs 0";
                        document.querySelector(".total-value").innerText = "Rs.0";
                        return;
                    }

                    // Loop through cart items
                    json.cartItems.forEach(cart => {
                        const p = cart.product;
                        const itemHTML = `
                <div class="flex items-start space-x-4 pb-6 border-b border-gray-200">
                    <div class="flex-shrink-0">
                        <img src="${cart.imagePath}" alt="${p.title}" class="w-20 h-20 object-cover object-top rounded-lg">
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm text-gray-600 mt-1">ITEM ID: ${p.productId}</p>
                        <h3 class="text-lg font-semibold text-gray-900">${p.title}</h3>
                        <p class="text-sm text-gray-600 mt-1">${p.description}</p>
                    </div>
                    <div class="flex flex-col justify-between items-end h-20 text-right">
                        <p class="text-lg font-bold text-gray-900">Rs.${p.price.toLocaleString()}</p>
                        <button onclick="removeCartItem('${p.productId}')" class="text-red-600 hover:text-red-800 transition-colors text-sm font-medium flex items-center">
                            <div class="w-4 h-4 flex items-center justify-center inline-block mr-1">
                                <i class="ri-delete-bin-line text-sm"></i>
                            </div>
                            Remove
                        </button>
                    </div>
                </div>
            `;
                        container.innerHTML += itemHTML;
                    });

                    // Order summary
                    document.querySelector(".subtotal-label").innerText = `Subtotal (${json.itemCount} item${json.itemCount > 1 ? 's' : ''})`;
                    document.querySelector(".subtotal-value").innerText = `Rs.${json.subtotal.toLocaleString()}`;
                    document.querySelector(".shipping-value").innerText = `Rs ${json.shippingCost.toLocaleString()}`;
                    document.querySelector(".total-value").innerText = `Rs.${json.grandTotal.toLocaleString()}`;

                } else {
                    iziToast.error({title: "Error", message: "Failed to load cart", position: "topRight"});
                }
            }


            document.addEventListener("DOMContentLoaded", loadCartAndCheckout);


            async function removeCartItem(productId) {
                iziToast.question({
                    timeout: 20000,
                    close: true,
                    overlay: true,
                    displayMode: 'once',
                    id: 'confirm-remove',
                    title: 'Remove Item',
                    message: 'Are you sure you want to remove this item?',
                    position: 'center',
                    buttons: [
                        ['<button><b>Yes</b></button>', async (instance, toast) => {
                                instance.hide({transitionOut: 'fadeOut'}, toast);

                                const response = await fetch("/ThrifteStop/RemoveCartServlet", {
                                    method: "POST",
                                    headers: {
                                        "Content-Type": "application/x-www-form-urlencoded"
                                    },
                                    body: `productId=${encodeURIComponent(productId)}`
                                });

                                if (response.ok) {
                                    const json = await response.json();
                                    if (json.status) {
                                        iziToast.success({
                                            title: 'Success',
                                            message: 'Item removed from cart',
                                            position: 'topRight'
                                        });
                                        loadCartAndCheckout();
                                    } else {
                                        iziToast.error({
                                            title: 'Error',
                                            message: json.message || 'Failed to remove item',
                                            position: 'topRight'
                                        });
                                    }
                                } else {
                                    iziToast.error({
                                        title: 'Error',
                                        message: 'Failed to communicate with server',
                                        position: 'topRight'
                                    });
                                }
                            }, true],
                        ['<button>No</button>', (instance, toast) => {
                                instance.hide({transitionOut: 'fadeOut'}, toast);
                            }]
                    ]
                });
            }






        </script>

        <script id="quantity-controls">
            document.addEventListener('DOMContentLoaded', function () {
                const quantityControls = document.querySelectorAll('.flex.items-center.border');

                quantityControls.forEach(control => {
                    const minusBtn = control.querySelector('button:first-child');
                    const plusBtn = control.querySelector('button:last-child');
                    const quantitySpan = control.querySelector('span');

                    minusBtn.addEventListener('click', function () {
                        let quantity = parseInt(quantitySpan.textContent);
                        if (quantity > 1) {
                            quantitySpan.textContent = quantity - 1;
                            updateTotal();
                        }
                    });

                    plusBtn.addEventListener('click', function () {
                        let quantity = parseInt(quantitySpan.textContent);
                        quantitySpan.textContent = quantity + 1;
                        updateTotal();
                    });
                });
            });
        </script>

        <script id="timer-animation">
            document.addEventListener('DOMContentLoaded', function () {
                const timerBars = document.querySelectorAll('.timer-bar');
                const timerTexts = document.querySelectorAll('.text-secondary');

                function updateTimers() {
                    timerBars.forEach((bar, index) => {
                        const currentWidth = parseFloat(bar.style.width);
                        const newWidth = Math.max(0, currentWidth - 0.1);
                        bar.style.width = newWidth + '%';

                        const minutes = Math.ceil((newWidth / 100) * 15);
                        const timerText = timerTexts[index * 2 + 1];
                        if (timerText) {
                            timerText.textContent = `${minutes} minutes remaining`;
                        }

                        if (newWidth <= 0) {
                            bar.style.backgroundColor = '#ef4444';
                            if (timerText) {
                                timerText.textContent = 'Reservation expired';
                                timerText.classList.add('text-red-600');
                            }
                        }
                    });
                }

                setInterval(updateTimers, 1000);
            });
        </script>

        <script>

            function loadHTML(id, url) {
                fetch(url)
                        .then(response => {
                            if (!response.ok)
                                throw new Error("Network response was not ok");
                            return response.text();
                        })
                        .then(data => {
                            const container = document.getElementById(id);
                            container.innerHTML = data;

                            // Extract and execute scripts manually
                            const scripts = container.querySelectorAll("script");
                            scripts.forEach(script => {
                                const newScript = document.createElement("script");
                                if (script.src) {
                                    newScript.src = script.src;
                                } else {
                                    newScript.textContent = script.textContent;
                                }
                                document.head.appendChild(newScript); // Append to head or body
                            });
                        })
                        .catch(error => {
                            console.error('Error loading HTML:', error);
                        });
            }


            document.addEventListener("DOMContentLoaded", function () {
                loadHTML("nav-placeholder", "header.html");
                loadHTML("footer-placeholder", "footer.html");
            });
        </script>
        <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>
        <script>
           async function checkout() {
               const response = await fetch("/ThrifteStop/CheckOutServlet", {
                   method: "POST"
               });

//                const popup = new Notification();

               if (response.ok) {
                   const json = await response.json();
                   if (json.status) {
                       payhere.startPayment(json.payhereJson);
                   } else {
                       iziToast.warning({
                           title: "Oops",
                           message: json.message || "Checkout failed",
                           position: "topRight"
                       });
                   }
               } else {
                   iziToast.error({
                       title: "Error",
                       message: "Something went wrong",
                       position: "topRight"
                   });
               }
           }



           document.getElementById("checkout-btn").addEventListener("click", checkout);

           payhere.onCompleted = async function onCompleted(orderId) {
               console.log("Payment completed. Order ID:", orderId);

               try {
                   const res = await fetch("/ThrifteStop/send-invoice", {method: "POST"});
                   const data = await res.json();
                   if (data.status === "success") {
                       console.log(data.message);
                   } else {
                       console.warn("Invoice failed:", data.message);
                   }
               } catch (error) {
                   console.error("Invoice sending failed:", error);
               }

               window.location = "home.html";
           };


           payhere.onDismissed = function onDismissed() {
               console.log("Payment dismissed");
           };

           payhere.onError = function onError(error) {
               console.log("Error occurred:", error);
           };

        </script>
