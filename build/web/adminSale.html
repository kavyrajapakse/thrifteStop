        <style>
            :where([class^="ri-"])::before {
                content: "\f3c2";
            }

            .chart-container {
                min-height: 300px;
            }

            input[type="checkbox"] {
                appearance: none;
                width: 1.2rem;
                height: 1.2rem;
                border: 2px solid #C7795B;
                border-radius: 4px;
                position: relative;
            }

            input[type="checkbox"]:checked {
                background-color: #C7795B;
            }

            input[type="checkbox"]:checked::after {
                content: "✓";
                position: absolute;
                color: white;
                font-size: 0.8rem;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .switch {
                width: 44px;
                height: 24px;
                background-color: #e5e7eb;
                border-radius: 9999px;
                position: relative;
                cursor: pointer;
                transition: background-color 0.2s;
            }

            .switch.active {
                background-color: #C7795B;
            }

            .switch::after {
                content: "";
                position: absolute;
                width: 20px;
                height: 20px;
                background-color: white;
                border-radius: 50%;
                top: 2px;
                left: 2px;
                transition: transform 0.2s;
            }

            .switch.active::after {
                transform: translateX(20px);
            }
        </style>

        <script>
            let sales = [];
            document.addEventListener("DOMContentLoaded", () => {
                loadOrderItems(1);

                // Pagination button listeners
                document.querySelectorAll("button").forEach(btn => {
                    const text = btn.textContent.trim().toLowerCase();
                    if (text === "previous") {
                        btn.addEventListener("click", () => changePage(-1));
                    } else if (text === "next") {
                        btn.addEventListener("click", () => changePage(1));
                    } else if (!isNaN(text)) {
                        btn.addEventListener("click", () => loadOrderItems(parseInt(text)));
                    }
                });

                // Filter button listener
                const filterBtn = Array.from(document.querySelectorAll("button"))
                        .find(btn => btn.textContent.trim().toLowerCase() === "apply filters");
                if (filterBtn) {
                    filterBtn.addEventListener("click", () => loadOrderItems(1));
                }
            });

            let currentPage = 1;

            function changePage(delta) {
                const newPage = currentPage + delta;
                if (newPage < 1)
                    return;
                loadOrderItems(newPage);
            }

            async function loadOrderItems(page) {
                const category = document.getElementById("categoryFilter").value;
                const dateFrom = document.getElementById("dateFrom").value;
                const dateTo = document.getElementById("dateTo").value;

                const params = new URLSearchParams();
                params.append("page", page);
                if (category)
                    params.append("categoryId", category);
                if (dateFrom)
                    params.append("dateFrom", dateFrom);
                if (dateTo)
                    params.append("dateTo", dateTo);

                try {
                    const response = await fetch(`/ThrifteStop/load-order-items?${params.toString()}`);
                    if (response.ok) {
                        const json = await response.json();
                        if (json.status) {
                            sales = json.items;
                            currentPage = page;
                            updateTable(json.items, json.total);
                            updatePaginationButtons(page);
                        } else {
                            console.error("Server error:", json.message);
                        }
                    } else {
                        console.error("HTTP Error:", response.status);
                    }
                } catch (err) {
                    console.error("Fetch error:", err);
                }
            }

            function updateTable(items, total) {
                const tbody = document.querySelector("table tbody");
                const tfoot = document.querySelector("table tfoot td:last-child");

                tbody.innerHTML = "";

                const grouped = {};

               
                items.forEach(item => {
                    if (!grouped[item.orderId]) {
                        grouped[item.orderId] = {
                            date: item.date,
                            items: [],
                            subtotal: 0
                        };
                    }
                    grouped[item.orderId].items.push(item);
                    grouped[item.orderId].subtotal += item.price;
                });

                
                Object.entries(grouped).forEach(([orderId, group]) => {
                    const {date, items, subtotal} = group;

                    // ⬆️ First item row with Order ID and Date
                    const firstItem = items[0];
                    const row = document.createElement("tr");
                    row.className = "border-b border-gray-100 bg-gray-50";
                    row.innerHTML = `
            <td class="py-4 px-4 font-medium">${date}</td>
            <td class="py-4 px-4 font-semibold text-primary">#${orderId}</td>
            <td class="py-4 px-4">${firstItem.title}</td>
            <td class="py-4 px-4">${firstItem.category}</td>
            <td class="py-4 px-4">Rs.${firstItem.price.toLocaleString()}</td>
        `;
                    tbody.appendChild(row);

                  
                    for (let i = 1; i < items.length; i++) {
                        const item = items[i];
                        const itemRow = document.createElement("tr");
                        itemRow.className = "border-b border-gray-100";
                        itemRow.innerHTML = `
                <td class="py-4 px-4"></td>
                <td class="py-4 px-4"></td>
                <td class="py-4 px-4">${item.title}</td>
                <td class="py-4 px-4">${item.category}</td>
                <td class="py-4 px-4">Rs.${item.price.toLocaleString()}</td>
            `;
                        tbody.appendChild(itemRow);
                    }

                   
                    const subtotalRow = document.createElement("tr");
                    subtotalRow.className = "border-b border-t border-gray-200 font-medium bg-white";
                    subtotalRow.innerHTML = `
            <td class="py-3 px-4 text-right" colspan="4">Subtotal for #${orderId}</td>
            <td class="py-3 px-4">Rs.${subtotal.toLocaleString()}</td>
        `;
                    tbody.appendChild(subtotalRow);
                });

                
                tfoot.textContent = `Rs.${total.toLocaleString()}`;
            }



            function updatePaginationButtons(current) {
                document.querySelectorAll(".pagination button").forEach(btn => {
                    const pageNum = parseInt(btn.textContent);
                    if (!isNaN(pageNum)) {
                        btn.classList.toggle("bg-primary", pageNum === current);
                        btn.classList.toggle("text-white", pageNum === current);
                    }
                });
            }


            document.getElementById("printBtn")?.addEventListener("click", () => {
                const today = new Date();
                const formattedDate = today.toISOString().split("T")[0];

                let printContent = `
        <h2 style="text-align:center;">Sales Report</h2>
        <p style="margin:4px 0; font-size:13px;">Date: ${formattedDate}</p>
        <table border="1" cellpadding="8" cellspacing="0" style="width:100%; font-family:sans-serif; font-size:14px; border-collapse:collapse;">
            <thead>
                <tr style="background-color:#C7795B; color:white;">
                    <th>Date</th>
                    <th>Order ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Price (Rs.)</th>
                </tr>
            </thead>
            <tbody>`;

               
                const grouped = {};
                sales.forEach(item => {
                    if (!grouped[item.orderId]) {
                        grouped[item.orderId] = {
                            date: item.date,
                            items: []
                        };
                    }
                    grouped[item.orderId].items.push(item);
                });

                let grandTotal = 0;

                
                Object.entries(grouped).forEach(([orderId, group]) => {
                    const {date, items} = group;
                    let orderSubtotal = 0;

                    items.forEach((item, index) => {
                        printContent += `
                <tr>
                    <td>${index === 0 ? date : ""}</td>
                    <td>${index === 0 ? "#" + orderId : ""}</td>
                    <td>${item.title}</td>
                    <td>${item.category}</td>
                    <td style="text-align:right;">Rs.${item.price.toLocaleString()}</td>
                </tr>`;
                        orderSubtotal += item.price;
                    });

                    printContent += `
            <tr style="font-weight:bold; background:#f9f9f9;">
                <td colspan="4" style="text-align:right;">Subtotal for #${orderId}</td>
                <td style="text-align:right;">Rs.${orderSubtotal.toLocaleString()}</td>
            </tr>`;

                    grandTotal += orderSubtotal;
                });

                printContent += `
        <tr style="font-weight:bold; background:#e0e0e0;">
            <td colspan="4" style="text-align:right;">Grand Total</td>
            <td style="text-align:right;">Rs.${grandTotal.toLocaleString()}</td>
        </tr>
        </tbody></table>`;

                const win = window.open('', '', 'width=900,height=650');
                win.document.write('<html><head><title>Sales Report</title></head><body>');
                win.document.write(printContent);
                win.document.write('</body></html>');
                win.document.close();
                win.print();
            });


            function logout() {
                fetch('/ThrifteStop/AdminLogout', {
                    method: 'POST'
                }).then(response => {
                    if (response.ok) {
                        iziToast.success({
                            title: 'Logged out',
                            message: 'You have been logged out.',
                            position: 'topRight'
                        });
                        setTimeout(() => {
                            window.location.href = 'adminSignIn.html'; // change if your login page differs
                        }, 1500);
                    } else {
                        iziToast.error({
                            title: 'Error',
                            message: 'Logout failed.',
                            position: 'topRight'
                        });
                    }
                }).catch(error => {
                    console.error(error);
                    iziToast.error({
                        title: 'Error',
                        message: 'Something went wrong.',
                        position: 'topRight'
                    });
                });
            }

        </script>



        <script>
            document.addEventListener("DOMContentLoaded", () => {
                loadCombo("/ThrifteStop/get-categories", "categoryFilter");
            });

            async function loadCombo(url, selectId) {
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        const data = await response.json();
                        const select = document.getElementById(selectId);
                        data.categories.forEach(item => {
                            const opt = document.createElement("option");
                            opt.value = item.id;
                            opt.textContent = item.name;
                            select.appendChild(opt);
                        });
                    } else {
                        console.error("Failed to load " + selectId + ": Server responded with status " + response.status);
                    }
                } catch (err) {
                    console.error("Error loading " + selectId + ":", err);
                }
            }
        </script>
